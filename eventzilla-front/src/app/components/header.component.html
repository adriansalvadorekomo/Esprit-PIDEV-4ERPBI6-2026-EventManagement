<header class="header-nav">
  <div class="header-inner">

    <!-- Logo -->
    <a href="#overview" class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="7" fill="#1f6feb" fill-opacity="0.18"/>
        <path d="M7 14h14M14 7v14" stroke="#388bfd" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      <span>EventZella</span>
    </a>

    <!-- Nav — Dashboards & Lab only for admin -->
    <nav class="nav-links">
      <a href="#overview" class="nav-link">Overview</a>
      <a *ngIf="auth.isAdmin" href="#dashboards" class="nav-link">Dashboards</a>
      <a *ngIf="auth.isAdmin" href="#lab"        class="nav-link">Lab</a>
      <a href="#about"    class="nav-link">About</a>
    </nav>

    <!-- Actions -->
    <div class="header-actions">
      <button class="icon-btn" (click)="theme.toggle()" [title]="theme.theme() === 'dark' ? 'Light mode' : 'Dark mode'">
        <svg *ngIf="theme.theme() === 'dark'" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path stroke-linecap="round" d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg *ngIf="theme.theme() === 'light'" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>

      <button *ngIf="!auth.isLoggedIn()" class="btn-signin" (click)="openModal()">Sign In</button>

      <ng-container *ngIf="auth.isLoggedIn()">
        <div class="user-badge">
          <span class="avatar">A</span>
          <span class="username">{{ auth.userName() }}</span>
        </div>
        <button class="btn-signout" (click)="auth.signOut()">Sign Out</button>
      </ng-container>
    </div>
  </div>
</header>

<!-- Login modal -->
<div class="modal-backdrop" *ngIf="showModal()" (click)="closeModal()"></div>
<div class="modal" *ngIf="showModal()" role="dialog" aria-modal="true">
  <div class="modal-header">
    <span class="modal-title">Sign In</span>
    <button class="modal-close" (click)="closeModal()">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="modal-body">
    <label class="field-label">Email</label>
    <input class="field-input" type="email" placeholder="you@example.com"
      [value]="email()" (input)="email.set($any($event.target).value)"
      (keydown)="onKeydown($event)" autocomplete="email"/>

    <label class="field-label" style="margin-top:0.9rem;">Password</label>
    <input class="field-input" type="password" placeholder="••••••••"
      [value]="password()" (input)="password.set($any($event.target).value)"
      (keydown)="onKeydown($event)" autocomplete="current-password"/>

    <p *ngIf="loginError()" class="login-error">{{ loginError() }}</p>

    <button class="btn-login" (click)="submit()">Sign In</button>
  </div>
</div>
